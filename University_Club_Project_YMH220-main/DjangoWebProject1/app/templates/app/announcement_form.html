{% extends "app/layout.html" %}
{% block content %}
<div class="container" style="max-width:700px;">
    <div class="card border-0 shadow rounded-lg overflow-hidden mt-4">
        <div class="card-header py-4" style="background-color:#800000;">
            <h4 class="text-white font-weight-bold mb-0"><i class="fas fa-bullhorn mr-2"></i>{{ title }}</h4>
        </div>
        <div class="card-body p-5">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group mb-4">
                    <label class="font-weight-bold small text-uppercase text-muted">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="d-flex justify-content-between mt-4">
                    <button type="submit" class="btn btn-maroon px-5 py-2 shadow-sm font-weight-bold">
                        <i class="fas fa-paper-plane mr-2"></i>Publish
                    </button>
                    <a href="{% url 'announcements' %}" class="btn btn-outline-secondary px-5 py-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<style>
    .btn-maroon { background-color: #800000; color: white !important; border: none; border-radius: 8px; transition: 0.3s; }
    .btn-maroon:hover { background-color: #600000; }
    .form-control:focus { border-color: #800000; box-shadow: 0 0 0 0.2rem rgba(128,0,0,0.15); }
</style>
{% endblock %}
