{% extends "app/layout.html" %}
{% block content %}
<div class="container" style="max-width:600px;">
    <div class="card border-0 shadow rounded-lg overflow-hidden mt-5">
        <div class="card-header py-4 bg-danger">
            <h4 class="text-white font-weight-bold mb-0"><i class="fas fa-exclamation-triangle mr-2"></i>Confirm Delete</h4>
        </div>
        <div class="card-body p-5 text-center">
            <div class="mb-4">
                <i class="fas fa-trash-alt fa-4x text-danger mb-3"></i>
                <h5 class="font-weight-bold">Delete {{ type }}</h5>
                <p class="text-muted">Are you sure you want to delete <strong>"{{ object }}"</strong>?<br>This action <strong>cannot be undone</strong>.</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-5 py-2 font-weight-bold mr-3">
                    <i class="fas fa-trash mr-2"></i>Yes, Delete
                </button>
                <a href="{% url cancel_url %}" class="btn btn-outline-secondary px-5 py-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
