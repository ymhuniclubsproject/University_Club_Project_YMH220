{% extends "app/layout.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0" style="width: 400px; border-radius: 15px;">
        <div class="card-body p-5 text-center">
            <h3 class="font-weight-bold text-maroon mb-4">Öđrenci Giriţi</h3>
            <form>
                <div class="form-group text-left">
                    <label class="small font-weight-bold">Öđrenci Numarasý</label>
                    <input type="text" class="form-control" placeholder="240541098">
                </div>
                <div class="form-group text-left">
                    <label class="small font-weight-bold">Üniversite E-posta</label>
                    <input type="email" class="form-control" placeholder="ogrenci@firat.edu.tr">
                </div>
                <button type="submit" class="btn btn-maroon btn-block font-weight-bold py-2 mt-4">Giriţ Yap</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
